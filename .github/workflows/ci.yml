name: ci

# Build + selfcheck on every push / PR. The GhosttyKit framework is fetched
# automatically by SwiftPM (URL + checksum binaryTarget in Package.swift), so no
# secrets or bootstrap are required to build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # Swift 6 toolchain (Package.swift needs tools 6.0)
      - name: Optional ghostty resources (themes)
        if: ${{ vars.GHOSTTY_RESOURCES_URL != '' }}
        env:
          GHOSTTY_RESOURCES_URL: ${{ vars.GHOSTTY_RESOURCES_URL }}
        run: |
          set -euo pipefail
          mkdir -p Resources && curl -fsSL "$GHOSTTY_RESOURCES_URL" -o /tmp/r.tgz
          tar -xzf /tmp/r.tgz -C Resources || unzip -q -o /tmp/r.tgz -d Resources
      - name: Build
        run: swift build -c debug
      - name: Selfcheck
        run: swift run vesta selfcheck
