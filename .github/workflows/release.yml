name: build & release

# Build Vesta.app on macOS, sign with Developer ID, notarize, staple, and attach
# a DMG to a GitHub Release. Runs on a version tag (v1.2.3) or manually.
#
# REQUIRED SECRETS (Settings ▸ Secrets and variables ▸ Actions) — see docs/SIGNING.md:
#   DEVELOPER_ID_CERT_P12_BASE64   base64 of your "Developer ID Application" .p12
#   DEVELOPER_ID_CERT_PASSWORD     password used when exporting the .p12
#   APPLE_TEAM_ID                  your 10-char Team ID
#   AC_API_KEY_ID                  App Store Connect API key id (for notarytool)
#   AC_API_ISSUER_ID               App Store Connect issuer id
#   AC_API_KEY_P8_BASE64           base64 of the AuthKey_XXXX.p8
# OPTIONAL VARIABLES (Settings ▸ ... ▸ Variables):
#   GHOSTTY_RESOURCES_URL          URL to a tar/zip of ghostty's resources dir (themes/)
# The GhosttyKit framework is fetched automatically by SwiftPM (see Package.swift),
# so no GHOSTTYKIT_URL is needed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the release

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable   # Swift 6 toolchain

      # GhosttyKit is fetched by SwiftPM (Package.swift). Only optional ghostty
      # resources (themes) need bootstrapping, when GHOSTTY_RESOURCES_URL is set.
      - name: Optional ghostty resources (themes)
        if: ${{ vars.GHOSTTY_RESOURCES_URL != '' }}
        env:
          GHOSTTY_RESOURCES_URL: ${{ vars.GHOSTTY_RESOURCES_URL }}
        run: |
          set -euo pipefail
          mkdir -p Resources
          curl -fsSL "$GHOSTTY_RESOURCES_URL" -o /tmp/gres.tgz
          tar -xzf /tmp/gres.tgz -C Resources || unzip -q -o /tmp/gres.tgz -d Resources

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PW:  ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=$RUNNER_TEMP/vesta-signing.keychain-db
          KCPW=$(openssl rand -hex 16)
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "SIGN_ID=$IDENT" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENT"

      - name: Build + sign Vesta.app
        # On a tag, stamp the bundle version from it (v0.1.0 → 0.1.0); on manual
        # dispatch GITHUB_REF_NAME is a branch, which make-app.sh ignores (falls back).
        run: SIGN_ID="$SIGN_ID" VESTA_VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh release

      - name: Notarize + staple
        env:
          KEY_ID:    ${{ secrets.AC_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          KEY_B64:   ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KEY_B64" | base64 --decode > /tmp/ac_key.p8
          ditto -c -k --keepParent Vesta.app /tmp/Vesta.zip
          xcrun notarytool submit /tmp/Vesta.zip \
            --key /tmp/ac_key.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" --wait
          xcrun stapler staple Vesta.app

      - name: Make DMG
        run: |
          set -euo pipefail
          mkdir -p dist/dmg && cp -R Vesta.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname Vesta -srcfolder dist/dmg -ov -format UDZO dist/Vesta.dmg
          xcrun stapler staple dist/Vesta.dmg || true

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Vesta.dmg
          generate_release_notes: true
