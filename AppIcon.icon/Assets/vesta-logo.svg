<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1d20"/>
      <stop offset="1" stop-color="#141517"/>
    </linearGradient>
    <!-- flame: deep accent at the base, hotter toward the tip -->
    <linearGradient id="flame" x1="256" y1="384" x2="256" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#e01050"/>
      <stop offset="0.55" stop-color="#ff3366"/>
      <stop offset="1"   stop-color="#ff7a9c"/>
    </linearGradient>
    <linearGradient id="core" x1="256" y1="352" x2="256" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b8e"/>
      <stop offset="1" stop-color="#ffe3ea"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded app tile, ghostty-style -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#tile)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="107.5" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>

  <!-- hearth ring at the base — a quiet nod to the old Halo ring -->
  <ellipse cx="256" cy="372" rx="118" ry="26" fill="none" stroke="#ff3366" stroke-opacity="0.22" stroke-width="6"/>

  <!-- the hearth flame -->
  <g filter="url(#glow)">
    <path d="M256 120
             C 300 188 332 228 332 290
             C 332 346 300 388 256 388
             C 212 388 180 348 180 292
             C 180 252 198 222 222 212
             C 213 248 231 274 254 270
             C 232 240 234 184 256 120 Z"
          fill="url(#flame)"/>
    <!-- pale-hot inner core -->
    <path d="M256 206
             C 282 246 298 270 298 304
             C 298 336 280 358 256 358
             C 232 358 214 338 214 306
             C 214 278 232 244 256 206 Z"
          fill="url(#core)"/>
  </g>
</svg>
